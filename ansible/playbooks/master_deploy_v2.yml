---
- name: Dynamic Multi-OS Management with Enhanced Software Support
  hosts: all
  gather_facts: yes

  vars:
    app_profiles:
      matlab:
        install_args: "-mode silent -agreeToLicense yes"
        uninstall_pattern: "MATLAB"
      vscode:
        install_args: "/VERYSILENT /SUPPRESSMSGBOXES /MERGETASKS=!runcode"
        uninstall_pattern: "Microsoft Visual Studio Code"
      notepadplusplus:
        install_args: "/S"
        uninstall_pattern: "Notepad++"
      python:
        install_args: "/quiet InstallAllUsers=1 PrependPath=1"
        uninstall_pattern: "Python"
      git:
        install_args: "/VERYSILENT /NORESTART"
        uninstall_pattern: "Git"
      nodejs:
        install_args: "/qn /norestart"
        uninstall_pattern: "Node.js"

  tasks:
    # =========================
    # WINDOWS LOGIC
    # =========================
    - block:

        # ------------------------------------------------------------------
        # Ensure Chocolatey is installed
        # ------------------------------------------------------------------
        - name: Ensure Chocolatey is installed
          ansible.windows.win_powershell:
            script: |
              if (-not (Test-Path "$env:ProgramData\chocolatey\bin\choco.exe")) {
                Set-ExecutionPolicy Bypass -Scope Process -Force
                [System.Net.ServicePointManager]::SecurityProtocol =
                  [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
                iex ((New-Object System.Net.WebClient).DownloadString(
                  'https://community.chocolatey.org/install.ps1'))
              }
              $chocoPath = "$env:ProgramData\chocolatey\bin\choco.exe"
              Write-Output "Chocolatey ready: $(& $chocoPath --version)"
          when:
            - choco_package is defined
            - choco_package | length > 0

        # ==================================================================
        # INSTALL
        # ==================================================================

        # ---------- Chocolatey install (primary) ----------
        - name: Install package(s) via Chocolatey
          ansible.windows.win_powershell:
            script: |
              $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") +
                          ";" +
                          [System.Environment]::GetEnvironmentVariable("Path","User")
              $chocoPath = "$env:ProgramData\chocolatey\bin\choco.exe"
              if (-not (Test-Path $chocoPath)) {
                Write-Error "Chocolatey not found at $chocoPath"
                exit 1
              }
              $packages = "{{ choco_package }}".Trim().Split()
              foreach ($pkg in $packages) {
                Write-Output "Installing: $pkg"
                $result = & $chocoPath install $pkg -y --no-progress 2>&1
                Write-Output $result
                if ($LASTEXITCODE -ne 0) {
                  Write-Error "Failed to install $pkg (exit code $LASTEXITCODE)"
                  exit $LASTEXITCODE
                }
                Write-Output "Successfully installed: $pkg"
              }
          when:
            - app_state == "present"
            - choco_package is defined
            - choco_package | length > 0

        # ---------- Local file install (fallback) ----------
        - name: Ensure C:\Temp exists
          ansible.windows.win_file:
            path: C:\Temp
            state: directory
          when:
            - app_state == "present"
            - choco_package is not defined or choco_package | length == 0
            - file_name is defined
            - file_name | length > 0

        - name: Copy installer to Windows
          ansible.windows.win_copy:
            src: "{{ playbook_dir }}/../../software_repo/{{ file_name }}"
            dest: "C:\\Temp\\{{ file_name }}"
          when:
            - app_state == "present"
            - choco_package is not defined or choco_package | length == 0
            - file_name is defined
            - file_name | length > 0

        - name: Detect installer type
          ansible.builtin.set_fact:
            installer_ext: "{{ file_name | regex_search('\\.(exe|msi|appx|msix)$') }}"
          when:
            - app_state == "present"
            - choco_package is not defined or choco_package | length == 0
            - file_name is defined
            - file_name | length > 0

        - name: Get custom install args if defined
          ansible.builtin.set_fact:
            custom_install_args: "{{ app_profiles[app_name].install_args | default('') }}"
          when:
            - app_state == "present"
            - choco_package is not defined or choco_package | length == 0
            - app_name is defined

        - name: Install Windows application (EXE)
          ansible.windows.win_package:
            path: "C:\\Temp\\{{ file_name }}"
            state: present
            arguments: "{{ custom_install_args | default('/S') }}"
          when:
            - app_state == "present"
            - choco_package is not defined or choco_package | length == 0
            - file_name is defined
            - file_name | length > 0
            - installer_ext == ".exe"

        - name: Install Windows application (MSI)
          ansible.windows.win_package:
            path: "C:\\Temp\\{{ file_name }}"
            state: present
            arguments: "{{ custom_install_args | default('/qn /norestart') }}"
          when:
            - app_state == "present"
            - choco_package is not defined or choco_package | length == 0
            - file_name is defined
            - file_name | length > 0
            - installer_ext == ".msi"

        # ==================================================================
        # UPDATE (via Chocolatey upgrade)
        # ==================================================================

        - name: Upgrade package(s) via Chocolatey
          ansible.windows.win_powershell:
            script: |
              $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") +
                          ";" +
                          [System.Environment]::GetEnvironmentVariable("Path","User")
              $chocoPath = "$env:ProgramData\chocolatey\bin\choco.exe"
              if (-not (Test-Path $chocoPath)) {
                Write-Error "Chocolatey not found at $chocoPath"
                exit 1
              }
              $packages = "{{ choco_package }}".Trim().Split()
              foreach ($pkg in $packages) {
                Write-Output "Upgrading: $pkg"
                $result = & $chocoPath upgrade $pkg -y --no-progress 2>&1
                Write-Output $result
                if ($LASTEXITCODE -ne 0) {
                  Write-Error "Failed to upgrade $pkg (exit code $LASTEXITCODE)"
                  exit $LASTEXITCODE
                }
                Write-Output "Successfully upgraded: $pkg"
              }
          when:
            - app_state == "latest"
            - choco_package is defined
            - choco_package | length > 0

        # ==================================================================
        # UNINSTALL
        # ==================================================================

        # ---------- Chocolatey uninstall (primary) ----------
        - name: Uninstall package(s) via Chocolatey
          ansible.windows.win_powershell:
            script: |
              $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") +
                          ";" +
                          [System.Environment]::GetEnvironmentVariable("Path","User")
              $chocoPath = "$env:ProgramData\chocolatey\bin\choco.exe"
              if (-not (Test-Path $chocoPath)) {
                Write-Error "Chocolatey not found at $chocoPath"
                exit 1
              }
              $packages = "{{ choco_package }}".Trim().Split()
              foreach ($pkg in $packages) {
                Write-Output "Uninstalling: $pkg"
                $result = & $chocoPath uninstall $pkg -y --no-progress --remove-dependencies 2>&1
                Write-Output $result
                if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 1) {
                  Write-Error "Failed to uninstall $pkg (exit code $LASTEXITCODE)"
                  exit $LASTEXITCODE
                }
                Write-Output "Successfully uninstalled: $pkg"
              }
          when:
            - app_state == "absent"
            - choco_package is defined
            - choco_package | length > 0

        # ---------- Registry uninstall (fallback) ----------
        - name: Set app_name automatically if not provided
          ansible.builtin.set_fact:
            app_name: >-
              {{
                (
                  {
                    '7zx64.exe': '7-Zip',
                    'vlc-3.0.23-win32.exe': 'VLC media player',
                    'VSCodeSetup.exe': 'Microsoft Visual Studio Code',
                    'npp.installer.exe': 'Notepad++'
                  }.get(file_name | default(''), (file_name | default('') | regex_replace('\.exe$', '')))
                )
              }}
          when:
            - app_state == "absent"
            - choco_package is not defined or choco_package | length == 0
            - app_name is not defined or app_name | length == 0

        - name: Find matching app in registry
          ansible.windows.win_powershell:
            script: |
              $name = "{{ app_name }}"
              $uninstallPaths = @(
                "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*",
                "HKLM:\Software\Wow6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*"
              )
              $app = Get-ItemProperty $uninstallPaths -ErrorAction SilentlyContinue |
                Where-Object { $_.DisplayName -and ($_.DisplayName -like "*$name*") } |
                Select-Object -First 1 DisplayName, UninstallString, QuietUninstallString
              if ($null -eq $app) {
                ""
              } else {
                $output = @{
                  DisplayName = $app.DisplayName
                  UninstallString = if ($app.UninstallString) { $app.UninstallString } else { "" }
                  QuietUninstallString = if ($app.QuietUninstallString) { $app.QuietUninstallString } else { "" }
                }
                $output | ConvertTo-Json -Depth 3
              }
          register: app_match_json
          when:
            - app_state == "absent"
            - choco_package is not defined or choco_package | length == 0
            - app_name is defined
            - app_name | length > 0

        - name: Set app_match fact
          ansible.builtin.set_fact:
            app_match: "{{ (app_match_json.output | default([]) | join('')) | from_json }}"
          when:
            - app_state == "absent"
            - choco_package is not defined or choco_package | length == 0
            - app_match_json.output | default([]) | join('') | length > 0

        - name: Show what we matched
          debug:
            msg:
              - "Looking for: {{ app_name }}"
              - "Matched: {{ app_match.DisplayName | default('NOT FOUND') }}"
              - "QuietUninstallString: {{ app_match.QuietUninstallString | default('') }}"
              - "UninstallString: {{ app_match.UninstallString | default('') }}"
          when:
            - app_state == "absent"
            - choco_package is not defined or choco_package | length == 0
            - app_name is defined

        - name: Fail if app not found in registry
          ansible.builtin.fail:
            msg: "Application not found. app_name='{{ app_name }}'. Try passing the exact DisplayName with -e app_name='...'"
          when:
            - app_state == "absent"
            - choco_package is not defined or choco_package | length == 0
            - app_name is defined
            - app_name | length > 0
            - app_match is not defined

        - name: Run uninstall command
          ansible.windows.win_powershell:
            script: |
              $ErrorActionPreference = "Stop"
              $quiet  = "{{ app_match.QuietUninstallString | default('') }}"
              $normal = "{{ app_match.UninstallString | default('') }}"
              $quiet  = $quiet.Trim().Trim('"')
              $normal = $normal.Trim().Trim('"')
              $cmd = if ($quiet) { $quiet } else { $normal }
              if (-not $cmd) {
                throw "No uninstall command found"
              }
              $silentFlags = ""
              if ($cmd -match 'uninstall\.exe' -and $cmd -notmatch '/S') {
                $silentFlags = " /S"
              } elseif ($cmd -match 'uninst\.exe' -and $cmd -notmatch '/VERYSILENT') {
                $silentFlags = " /VERYSILENT /SUPPRESSMSGBOXES /NORESTART"
              } elseif ($cmd -match 'msiexec' -and $cmd -notmatch '/qn') {
                if ($cmd -notmatch '/quiet') { $silentFlags = " /quiet /norestart" }
              }
              $fullCmd = $cmd + $silentFlags
              Write-Output "Running: $fullCmd"
              if ($fullCmd -match '^msiexec') {
                $process = Start-Process -FilePath "cmd.exe" -ArgumentList "/c $fullCmd" -Wait -PassThru -NoNewWindow
              } else {
                $process = Start-Process -FilePath $cmd -ArgumentList $silentFlags.Trim() -Wait -PassThru -NoNewWindow -ErrorAction SilentlyContinue
                if (-not $process) {
                  $process = Start-Process -FilePath "cmd.exe" -ArgumentList "/c `"$fullCmd`"" -Wait -PassThru -NoNewWindow
                }
              }
              $exitCode = $process.ExitCode
              Write-Output "Uninstaller exit code: $exitCode"
              if ($exitCode -eq 0 -or $exitCode -eq 3010) {
                exit 0
              } else {
                exit $exitCode
              }
          register: uninstall_result
          when:
            - app_state == "absent"
            - choco_package is not defined or choco_package | length == 0
            - app_match is defined

        - name: Uninstall output
          debug:
            var: uninstall_result.output
          when:
            - app_state == "absent"
            - choco_package is not defined or choco_package | length == 0
            - uninstall_result is defined

      when: ansible_facts["os_family"] == "Windows"

    # =========================
    # LINUX LOGIC (DEBIAN/UBUNTU)
    # =========================
    - block:

        # ---------- Install ----------
        - name: Linux - Install package(s) via APT
          ansible.builtin.apt:
            name: "{{ package_name }}"
            state: present
            update_cache: yes
          when: app_state == "present"

        # ---------- Remove ----------
        - name: Linux - Remove package(s) via APT
          ansible.builtin.apt:
            name: "{{ package_name }}"
            state: absent
            purge: "{{ true if (purge | default('false') | string == 'true') else false }}"
          when: app_state == "absent"

        - name: Linux - Autoremove orphaned packages
          ansible.builtin.apt:
            autoremove: yes
          when:
            - app_state == "absent"
            - autoremove | default('true') | string == 'true'

        # ---------- Update ----------
        - name: Linux - Update package cache
          ansible.builtin.apt:
            update_cache: yes
          when: app_state == "latest"

        - name: Linux - Upgrade specific package(s) via APT
          ansible.builtin.apt:
            name: "{{ package_name }}"
            state: latest
          when:
            - app_state == "latest"
            - package_name is defined
            - package_name | length > 0
            - dist_upgrade | default('false') | string == 'false'

        - name: Linux - Full dist-upgrade
          ansible.builtin.apt:
            upgrade: dist
          when:
            - app_state == "latest"
            - dist_upgrade | default('false') | string == 'true'

      become: yes
      when: ansible_facts["os_family"] == "Debian"